<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hiring / X</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='white' d='M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z'/></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="sidebar"></header>

    <main class="main">
      <div class="col-header">
        <h1>Hiring</h1>
        <div class="tabs">
          <div class="tab active">Open roles</div>
          <div class="tab">Saved</div>
        </div>
      </div>

      <div class="hiring-intro">
        <p>Post a job offer to the X community. Fill the form below — it's added to the board instantly.</p>
      </div>

      <form class="job-form" id="job-form">
        <input name="role" placeholder="Role — e.g. Senior Frontend Engineer" required>
        <div class="grid2">
          <input name="company" placeholder="Company" required>
          <input name="location" placeholder="Location — e.g. Remote / Paris">
        </div>
        <div class="grid2">
          <select name="type">
            <option value="Full-time">Full-time</option>
            <option value="Part-time">Part-time</option>
            <option value="Contract">Contract</option>
            <option value="Internship">Internship</option>
          </select>
          <input name="salary" placeholder="Salary — e.g. $120k–$160k">
        </div>
        <textarea name="desc" placeholder="Short description of the role..."></textarea>
        <button type="submit">Post job</button>
      </form>

      <div id="jobs"></div>
    </main>

    <aside class="right"></aside>
  </div>

  <script src="shell.js"></script>
  <script src="hiring.js"></script>
  <script>mountShell('hiring'); initHiring();</script>
</body>
</html>
